<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PlayThatOne__ // Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: #0a0a0a; color: #f0ece4; font-family: "Share Tech Mono", monospace; min-height: 100vh; padding: 2rem; }

  h1 { font-family: "Special Elite", cursive; font-size: 1.8rem; margin-bottom: 0.3rem; }
  h1 span { color: #555; }
  .subtitle { font-size: 0.65rem; color: #555; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 2.5rem; }

  #login-screen { max-width: 400px; margin: 5rem auto; border: 1px solid #222; padding: 2rem; }

  .section { margin-bottom: 3rem; }
  .section-label {
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: #555;
    margin-bottom: 1.2rem; display: flex; align-items: center; gap: 1rem;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: #1a1a1a; }

  .btn-reset {
    background: transparent; border: 1px solid #555; color: #f0ece4;
    font-family: "Share Tech Mono", monospace; font-size: 0.75rem;
    letter-spacing: 0.2em; text-transform: uppercase; padding: 0.8rem 2rem;
    cursor: pointer; transition: all 0.15s; display: block; width: 100%; margin-bottom: 1rem;
  }
  .btn-reset:hover { background: #f0ece4; color: #0a0a0a; border-color: #f0ece4; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1px; margin-bottom: 1.5rem; }
  .stat-box { border: 1px solid #1a1a1a; padding: 1rem; background: #0d0d0d; }
  .stat-value { font-family: "Special Elite", cursive; font-size: 2rem; }
  .stat-label { font-size: 0.6rem; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; }

  .song-row {
    border: 1px solid #1a1a1a; padding: 1rem 1.2rem; margin-bottom: 1px;
    display: grid; grid-template-columns: 1fr auto auto auto;
    align-items: center; gap: 1rem; background: #0d0d0d;
  }
  .song-row-title { font-family: "Special Elite", cursive; font-size: 1rem; }
  .song-row-artist { font-size: 0.65rem; color: #555; margin-top: 0.2rem; }
  .song-row-votes { font-size: 0.7rem; color: #888; min-width: 60px; text-align: right; }

  .btn-sm {
    background: transparent; border: 1px solid #333; color: #888;
    font-family: "Share Tech Mono", monospace; font-size: 0.6rem;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 0.3rem 0.7rem;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:hover { border-color: #f0ece4; color: #f0ece4; }
  .btn-sm.red:hover { background: #f0ece4; color: #0a0a0a; }
  .source-tab.active { background: #f0ece4; color: #0a0a0a; border-color: #f0ece4; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 1px; margin-bottom: 1rem; }

  input[type=text], input[type=password], textarea {
    background: #0d0d0d; border: 1px solid #222; color: #f0ece4;
    font-family: "Share Tech Mono", monospace; font-size: 0.75rem;
    padding: 0.7rem 1rem; outline: none; transition: border-color 0.15s; width: 100%;
  }
  input:focus, textarea:focus { border-color: #555; }
  textarea { resize: vertical; min-height: 200px; }

  .btn-primary {
    background: #f0ece4; border: 1px solid #f0ece4; color: #0a0a0a;
    font-family: "Share Tech Mono", monospace; font-size: 0.75rem;
    letter-spacing: 0.15em; text-transform: uppercase; padding: 0.7rem 1.5rem;
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .btn-primary:hover { background: transparent; color: #f0ece4; }

  /* AUTOCOMPLETE */
  .search-wrap { position: relative; margin-bottom: 1px; }

  .ac-results {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: #0d0d0d; border: 1px solid #333; border-top: none;
    max-height: 280px; overflow-y: auto; display: none;
  }
  .ac-results.open { display: block; }

  .ac-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.7rem 1rem; cursor: pointer; transition: background 0.1s;
    border-bottom: 1px solid #1a1a1a;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: #1a1a1a; }
  .ac-thumb { width: 36px; height: 36px; object-fit: cover; border: 1px solid #222; flex-shrink: 0; background: #1a1a1a; }
  .ac-info { flex: 1; min-width: 0; }
  .ac-title { font-family: "Special Elite", cursive; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ac-artist { font-size: 0.6rem; color: #555; margin-top: 0.15rem; }
  .ac-msg { padding: 1rem; font-size: 0.65rem; color: #555; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 500; padding: 2rem; }
  .overlay.open { display: flex; }
  .modal { background: #0a0a0a; border: 1px solid #333; padding: 2rem; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
  .modal h2 { font-family: "Special Elite", cursive; font-size: 1.2rem; }
  .genius-label { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: #555; border: 1px solid #222; padding: 0.15rem 0.4rem; display: inline-block; margin-bottom: 0.5rem; }
  .modal-actions { display: flex; gap: 1px; margin-top: 0.5rem; }

  /* TOAST */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: #f0ece4; color: #0a0a0a; padding: 0.8rem 1.5rem; font-family: "Share Tech Mono", monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 600; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 10px; height: 10px; border: 1px solid #555; border-top-color: #f0ece4; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }

  /* QR CODE */
  .qr-wrap {
    display: flex; gap: 3rem; align-items: flex-start; flex-wrap: wrap;
  }
  .qr-box {
    background: #f0ece4; padding: 1.2rem;
    display: inline-block; line-height: 0;
    transition: background 0.2s;
  }
  .qr-url {
    font-size: 0.65rem; color: #555; letter-spacing: 0.1em;
    margin-top: 0.8rem; word-break: break-all;
  }
  .qr-actions { display: flex; flex-direction: column; gap: 1px; justify-content: flex-start; margin-top: 0; }
  .qr-actions .btn-reset { margin-bottom: 0; }
  .qr-input-row { display: flex; gap: 1px; margin-bottom: 1rem; }
  .qr-input-row input { flex: 1; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div id="login-screen">
  <h1><span>__</span>Admin<span>__</span></h1>
  <p class="subtitle" style="margin-bottom:1.5rem">Acceso restringido</p>
  <input type="password" id="token-input" placeholder="Token de acceso" style="margin-bottom:1px">
  <button class="btn-primary" style="width:100%;margin-top:1px" id="btn-login">Entrar</button>
  <div id="login-error" style="font-size:0.65rem;color:#555;margin-top:0.8rem;letter-spacing:0.1em"></div>
</div>

<div id="admin-panel" style="display:none;max-width:900px;margin:0 auto">
  <h1><span>__</span>PlayThatOne<span>__</span></h1>
  <p class="subtitle">Panel de control</p>

  <div class="section">
    <div class="section-label">En directo</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-value" id="stat-votes">-</div><div class="stat-label">Votos totales</div></div>
      <div class="stat-box"><div class="stat-value" id="stat-connected">-</div><div class="stat-label">Conectados</div></div>
      <div class="stat-box"><div class="stat-value" id="stat-songs">-</div><div class="stat-label">Canciones</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Acciones</div>
    <button class="btn-reset" style="border-color:#f0ece4" id="btn-reset-votes">Reiniciar todos los votos</button>
    <button class="btn-reset" id="btn-refresh">Actualizar estadisticas</button>
  </div>

  <div class="section">
    <div class="section-label">QR Code — comparte con el publico</div>
    <div class="qr-input-row">
      <input type="text" id="qr-url-input" placeholder="URL de la app (se detecta automaticamente)">
      <button class="btn-primary" onclick="generateQR()">Generar</button>
    </div>
    <div class="qr-wrap">
      <div>
        <div class="qr-box" id="qr-container"></div>
        <div class="qr-url" id="qr-url-display"></div>
      </div>
      <div class="qr-actions" id="qr-actions" style="display:none">
        <button class="btn-reset" onclick="printQR()">Imprimir QR</button>
        <button class="btn-reset" onclick="downloadQR()">Descargar imagen</button>
        <button class="btn-reset" onclick="copyQRUrl()">Copiar URL</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Catalogo</div>
    <div id="songs-list"></div>
  </div>

  <div class="section">
    <div class="section-label">Anadir cancion</div>
    <div class="search-wrap">
      <input type="text" id="genius-search" placeholder="Buscar en Genius — titulo o artista..." autocomplete="off" oninput="onGeniusSearch(this.value)">
      <div class="ac-results" id="ac-add"></div>
    </div>
    <div class="form-grid" style="margin-top:1px">
      <input type="text" id="new-title" placeholder="Titulo">
      <input type="text" id="new-artist" placeholder="Artista">
      <button class="btn-primary" id="btn-add-song">Anadir</button>
    </div>
    <div style="font-size:0.6rem;color:#333;letter-spacing:0.1em;margin-top:0.5rem">Selecciona un resultado o escribe manualmente</div>
  </div>
</div>

<div class="overlay" id="lyrics-overlay">
  <div class="modal">
    <h2 id="modal-song-title">Editar letra</h2>
    <div>
      <div style="display:flex;gap:1px;margin-bottom:0.5rem">
        <button class="btn-sm source-tab active" id="tab-genius" onclick="setSource('genius')">Genius</button>
        <button class="btn-sm source-tab" id="tab-chartlyrics" onclick="setSource('chartlyrics')">ChartLyrics</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="modal-genius-search" placeholder="Buscar..." autocomplete="off" oninput="onModalGeniusSearch(this.value)">
        <div class="ac-results" id="ac-modal"></div>
      </div>
    </div>
    <textarea id="modal-lyrics" placeholder="Las parolas apareceran aqui tras importar, o escribe manualmente..."></textarea>
    <div class="modal-actions">
      <button class="btn-primary" id="btn-save-lyrics">Guardar</button>
      <button class="btn-reset" style="flex:1" id="btn-close-modal">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token = "";
let editingSongId = null;
let songs = [];
let searchTimer = null;
let modalSearchTimer = null;

// AUTH
async function login() {
  token = document.getElementById("token-input").value.trim();
  try {
    const res = await fetch("/admin/stats", { headers: { "Authorization": "Bearer " + token } });
    if (!res.ok) throw new Error();
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("admin-panel").style.display = "block";
    loadStats();
    setInterval(loadStats, 5000);
  } catch {
    document.getElementById("login-error").textContent = "Token incorrecto";
  }
}


// API
async function api(path, method, body) {
  method = method || "GET";
  var opts = { method: method, headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(path, opts);
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

// STATS
async function loadStats() {
  try {
    var data = await api("/admin/stats");
    songs = data.songs;
    document.getElementById("stat-votes").textContent = data.total_votes;
    document.getElementById("stat-connected").textContent = data.connected_clients;
    document.getElementById("stat-songs").textContent = songs.length;
    renderSongs();
  } catch(e) { console.error(e); }
}

function renderSongs() {
  var container = document.getElementById("songs-list");
  container.innerHTML = "";
  songs.forEach(function(song) {
    var row = document.createElement("div");
    row.className = "song-row";

    var info = document.createElement("div");
    var titleEl = document.createElement("div");
    titleEl.className = "song-row-title";
    titleEl.textContent = song.title;
    var artistEl = document.createElement("div");
    artistEl.className = "song-row-artist";
    artistEl.textContent = song.artist;
    info.appendChild(titleEl);
    info.appendChild(artistEl);

    var votesEl = document.createElement("div");
    votesEl.className = "song-row-votes";
    votesEl.textContent = song.votes + " voto" + (song.votes !== 1 ? "s" : "");

    var btnLyrics = document.createElement("button");
    btnLyrics.className = "btn-sm";
    btnLyrics.textContent = song.lyrics ? "Letra" : "+ Letra";
    (function(id) {
      btnLyrics.addEventListener("click", function() { openLyricsModal(id); });
    })(song.id);

    var btnDelete = document.createElement("button");
    btnDelete.className = "btn-sm red";
    btnDelete.textContent = "Eliminar";
    (function(id, title) {
      btnDelete.addEventListener("click", function() { deleteSong(id, title); });
    })(song.id, song.title);

    row.appendChild(info);
    row.appendChild(votesEl);
    row.appendChild(btnLyrics);
    row.appendChild(btnDelete);
    container.appendChild(row);
  });
}

// ADD / DELETE
async function addSong() {
  var title = document.getElementById("new-title").value.trim();
  var artist = document.getElementById("new-artist").value.trim();
  if (!title || !artist) { showToast("Titulo y artista requeridos"); return; }
  try {
    await api("/admin/songs", "POST", { title: title, artist: artist, position: songs.length });
    document.getElementById("new-title").value = "";
    document.getElementById("new-artist").value = "";
    document.getElementById("genius-search").value = "";
    document.getElementById("ac-add").classList.remove("open");
    await loadStats();
    showToast("Cancion anadida");
  } catch { showToast("Error al anadir"); }
}

async function deleteSong(id, title) {
  if (!confirm('Eliminar "' + title + '"?')) return;
  try {
    await api("/admin/songs/" + id, "DELETE");
    await loadStats();
    showToast("Cancion eliminada");
  } catch(e) { showToast("Error: " + e.message); }
}

async function resetVotes() {
  if (!confirm("Reiniciar TODOS los votos?")) return;
  try {
    await api("/admin/reset", "POST");
    await loadStats();
    showToast("Votos reiniciados");
  } catch { showToast("Error"); }
}

// GENIUS AUTOCOMPLETE - section add
function onGeniusSearch(val) {
  clearTimeout(searchTimer);
  var box = document.getElementById("ac-add");
  if (val.length < 2) { box.classList.remove("open"); return; }
  box.innerHTML = '<div class="ac-msg"><span class="spinner"></span>Buscando...</div>';
  box.classList.add("open");
  searchTimer = setTimeout(function() { fetchSuggestions(val, "ac-add", selectForAdd); }, 450);
}

function selectForAdd(hit) {
  document.getElementById("new-title").value = hit.title;
  document.getElementById("new-artist").value = hit.artist;
  document.getElementById("genius-search").value = hit.title + " - " + hit.artist;
  document.getElementById("ac-add").classList.remove("open");
}

// SOURCE SWITCHING
var currentSource = "genius";

function setSource(source) {
  currentSource = source;
  document.getElementById("tab-genius").classList.toggle("active", source === "genius");
  document.getElementById("tab-chartlyrics").classList.toggle("active", source === "chartlyrics");
  document.getElementById("modal-genius-search").value = "";
  document.getElementById("ac-modal").classList.remove("open");
  var placeholder = source === "genius" ? "Buscar en Genius..." : "Buscar en ChartLyrics...";
  document.getElementById("modal-genius-search").placeholder = placeholder;
}

// GENIUS AUTOCOMPLETE - modal
function onModalGeniusSearch(val) {
  clearTimeout(modalSearchTimer);
  var box = document.getElementById("ac-modal");
  if (val.length < 2) { box.classList.remove("open"); return; }
  box.innerHTML = '<div class="ac-msg"><span class="spinner"></span>Buscando...</div>';
  box.classList.add("open");
  if (currentSource === "genius") {
    modalSearchTimer = setTimeout(function() { fetchSuggestions(val, "ac-modal", selectForModal); }, 450);
  } else {
    modalSearchTimer = setTimeout(function() { fetchChartLyrics(val, "ac-modal", selectChartLyrics); }, 450);
  }
}

async function selectForModal(hit) {
  document.getElementById("modal-genius-search").value = hit.title + " - " + hit.artist;
  document.getElementById("ac-modal").classList.remove("open");
  var ta = document.getElementById("modal-lyrics");
  ta.value = ""; ta.placeholder = "Importando...";
  try {
    var data = await api("/admin/genius/lyrics?url=" + encodeURIComponent(hit.url));
    ta.value = data.lyrics; ta.placeholder = "";
    showToast("Paroles importadas desde Genius");
  } catch(e) {
    ta.placeholder = "Error Genius - prueba ChartLyrics";
    showToast("Error Genius — prueba ChartLyrics");
  }
}

async function selectChartLyrics(hit) {
  document.getElementById("modal-genius-search").value = hit.title + " - " + hit.artist;
  document.getElementById("ac-modal").classList.remove("open");
  var ta = document.getElementById("modal-lyrics");
  ta.value = ""; ta.placeholder = "Importando desde ChartLyrics...";
  try {
    // Call ChartLyrics directly from browser (no server restriction)
    var url = "https://api.chartlyrics.com/apiv1.asmx/SearchLyricDirect"
      + "?lyricsartist=" + encodeURIComponent(hit.artist)
      + "&lyricssong=" + encodeURIComponent(hit.title);
    var res = await fetch(url);
    var xml = await res.text();
    var parser = new DOMParser();
    var doc = parser.parseFromString(xml, "text/xml");
    var lyricNode = doc.querySelector("Lyric");
    var lyrics = lyricNode ? lyricNode.textContent.trim() : "";
    if (lyrics && lyrics.length > 50) {
      ta.value = lyrics; ta.placeholder = "";
      showToast("Paroles importadas desde ChartLyrics");
    } else {
      ta.placeholder = "Sin paroles — prueba otro titulo o escribe manualmente";
      showToast("Sin paroles en ChartLyrics para esta cancion");
    }
  } catch(e) {
    ta.placeholder = "Error - escribe manualmente";
    showToast("Error ChartLyrics: " + e.message);
  }
}

async function fetchChartLyrics(query, boxId, onSelect) {
  var box = document.getElementById(boxId);
  try {
    // Call ChartLyrics directly from browser
    var url = "https://api.chartlyrics.com/apiv1.asmx/SearchLyric"
      + "?lyricText=" + encodeURIComponent(query);
    var res = await fetch(url);
    var xml = await res.text();
    var parser = new DOMParser();
    var doc = parser.parseFromString(xml, "text/xml");
    var items = doc.querySelectorAll("SearchLyricResult");
    if (!items.length) {
      box.innerHTML = '<div class="ac-msg">Sin resultados</div>';
      return;
    }
    box.innerHTML = "";
    var seen = {};
    var count = 0;
    items.forEach(function(node) {
      if (count >= 8) return;
      var artist = node.querySelector("Artist") ? node.querySelector("Artist").textContent.trim() : "";
      var song = node.querySelector("Song") ? node.querySelector("Song").textContent.trim() : "";
      var lid = node.querySelector("LyricId") ? node.querySelector("LyricId").textContent.trim() : "";
      var key = artist + "|" + song;
      if (!artist || !song || !lid || seen[key]) return;
      seen[key] = true;
      count++;
      var item = document.createElement("div");
      item.className = "ac-item";
      var info = document.createElement("div");
      info.className = "ac-info";
      var titleEl = document.createElement("div");
      titleEl.className = "ac-title";
      titleEl.textContent = song;
      var artistEl = document.createElement("div");
      artistEl.className = "ac-artist";
      artistEl.textContent = artist;
      info.appendChild(titleEl);
      info.appendChild(artistEl);
      item.appendChild(info);
      var hit = { title: song, artist: artist, chartlyrics_id: lid };
      item.addEventListener("mousedown", function(e) { e.preventDefault(); onSelect(hit); });
      box.appendChild(item);
    });
    if (!count) box.innerHTML = '<div class="ac-msg">Sin resultados</div>';
  } catch(e) {
    box.innerHTML = '<div class="ac-msg">Error de conexion</div>';
    console.error("ChartLyrics error:", e);
  }
}

// SHARED FETCH
async function fetchSuggestions(query, boxId, onSelect) {
  var box = document.getElementById(boxId);
  try {
    var results = await api("/admin/genius/search?q=" + encodeURIComponent(query));
    if (!results.length) { box.innerHTML = '<div class="ac-msg">Sin resultados</div>'; return; }
    box.innerHTML = "";
        results.forEach(function(hit) {
      var item = document.createElement("div");
      item.className = "ac-item";

      var img = document.createElement("img");
      img.className = "ac-thumb";
      img.src = hit.thumbnail || "";
      img.alt = "";
      img.addEventListener("error", function() { this.style.display = "none"; });

      var info = document.createElement("div");
      info.className = "ac-info";

      var titleEl = document.createElement("div");
      titleEl.className = "ac-title";
      titleEl.textContent = hit.title;

      var artistEl = document.createElement("div");
      artistEl.className = "ac-artist";
      artistEl.textContent = hit.artist;

      info.appendChild(titleEl);
      info.appendChild(artistEl);
      item.appendChild(img);
      item.appendChild(info);

      item.addEventListener("mousedown", function(e) { e.preventDefault(); onSelect(hit); });
      box.appendChild(item);
    });
  } catch(e) {
    box.innerHTML = '<div class="ac-msg">Error de conexion</div>';
    console.error(e);
  }
}

// LYRICS MODAL
function openLyricsModal(id) {
  editingSongId = id;
  var song = songs.find(function(s) { return s.id === id; });
  document.getElementById("modal-song-title").textContent = song ? song.title : "Editar letra";
  document.getElementById("modal-genius-search").value = "";
  document.getElementById("ac-modal").classList.remove("open");
  document.getElementById("modal-lyrics").value = song && song.lyrics ? song.lyrics : "";
  document.getElementById("lyrics-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("lyrics-overlay").classList.remove("open");
  editingSongId = null;
}

async function saveLyrics() {
  var lyrics = document.getElementById("modal-lyrics").value;
  try {
    await api("/admin/songs/" + editingSongId + "/lyrics", "POST", { lyrics: lyrics });
    await loadStats();
    closeModal();
    showToast("Letra guardada");
  } catch { showToast("Error al guardar"); }
}

// Close dropdowns on outside click
document.addEventListener("click", function(e) {
  if (!e.target.closest(".search-wrap")) {
    document.querySelectorAll(".ac-results").forEach(function(el) { el.classList.remove("open"); });
  }
});

// QR CODE
var qrInstance = null;

function generateQR() {
  var url = document.getElementById("qr-url-input").value.trim();
  if (!url) url = window.location.origin;

  var container = document.getElementById("qr-container");
  var display = document.getElementById("qr-url-display");
  var actions = document.getElementById("qr-actions");

  container.innerHTML = "";

  qrInstance = new QRCode(container, {
    text: url,
    width: 200,
    height: 200,
    colorDark: "#0a0a0a",
    colorLight: "#f0ece4",
    correctLevel: QRCode.CorrectLevel.H
  });

  display.textContent = url;
  actions.style.display = "flex";
  showToast("QR generado");
}

function printQR() {
  var url = document.getElementById("qr-url-input").value.trim() || window.location.origin;
  var img = document.querySelector("#qr-container img");
  if (!img) { showToast("Genera el QR primero"); return; }
  var win = window.open("", "_blank");
  win.document.write(
    "<html><head><title>PlayThatOne QR</title>" +
    "<style>body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f0ece4;font-family:monospace;gap:1.5rem;}" +
    "img{width:280px;height:280px}" +
    "p{font-size:0.8rem;letter-spacing:0.15em;color:#333;text-transform:uppercase;text-align:center;max-width:300px}" +
    "h2{font-size:1.5rem;letter-spacing:0.05em;color:#0a0a0a;margin:0}" +
    "</style></head><body>" +
    "<h2>PlayThatOne</h2>" +
    "<img src='" + img.src + "'>" +
    "<p>" + url + "</p>" +
    "<p>Escanea para votar la proxima cancion</p>" +
    "</body></html>"
  );
  win.document.close();
  win.focus();
  setTimeout(function() { win.print(); }, 500);
}

function downloadQR() {
  var canvas = document.querySelector("#qr-container canvas");
  var img = document.querySelector("#qr-container img");
  if (canvas) {
    var link = document.createElement("a");
    link.download = "playthatone-qr.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  } else if (img) {
    var link = document.createElement("a");
    link.download = "playthatone-qr.png";
    link.href = img.src;
    link.click();
  } else {
    showToast("Genera el QR primero");
  }
}

function copyQRUrl() {
  var url = document.getElementById("qr-url-input").value.trim() || window.location.origin;
  navigator.clipboard.writeText(url).then(function() {
    showToast("URL copiada");
  }).catch(function() {
    showToast(url);
  });
}

// TOAST
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}

// Wire up buttons
document.addEventListener("DOMContentLoaded", function() {
  // Auto-fill QR URL
  var qrInput = document.getElementById("qr-url-input");
  if (qrInput) qrInput.value = window.location.origin;

  var btnLogin = document.getElementById("btn-login");
  if (btnLogin) btnLogin.addEventListener("click", login);
  var btnReset = document.getElementById("btn-reset-votes");
  if (btnReset) btnReset.addEventListener("click", resetVotes);
  var btnRefresh = document.getElementById("btn-refresh");
  if (btnRefresh) btnRefresh.addEventListener("click", loadStats);
  var btnAdd = document.getElementById("btn-add-song");
  if (btnAdd) btnAdd.addEventListener("click", addSong);
  var btnSave = document.getElementById("btn-save-lyrics");
  if (btnSave) btnSave.addEventListener("click", saveLyrics);
  var btnClose = document.getElementById("btn-close-modal");
  if (btnClose) btnClose.addEventListener("click", closeModal);
  var tokenInput = document.getElementById("token-input");
  if (tokenInput) tokenInput.addEventListener("keydown", function(e) { if (e.key === "Enter") login(); });
});

</script>
