<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PlayThatOne__</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f0ece4;
    --mid: #888;
    --bg: #0a0a0a;
    --fg: #f0ece4;
    --border: #222;
    --card: #0d0d0d;
    --card-hover: #1a1a1a;
  }

  :root.light {
    --bg: #f0ece4;
    --fg: #0a0a0a;
    --border: #ccc;
    --card: #e8e4dc;
    --card-hover: #ddd8d0;
    --mid: #666;
    --white: #0a0a0a;
    --black: #f0ece4;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 100; opacity: 0.4;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1.5rem;
  }

  .logo {
    font-family: 'Special Elite', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    letter-spacing: -0.02em; line-height: 1;
  }
  .logo span { color: var(--mid); }

  .tagline {
    font-size: 0.7rem; color: var(--mid);
    letter-spacing: 0.15em; text-transform: uppercase;
  }

  .live-dot {
    width: 8px; height: 8px; background: var(--white);
    border-radius: 50%; display: inline-block;
    margin-right: 6px; animation: pulse 1.5s infinite;
  }
  .live-dot.disconnected { background: #444; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.3; transform: scale(0.7); }
  }

  main { max-width: 900px; margin: 0 auto; padding: 2rem; }

  .section-label {
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--mid); margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: #222; }

  /* VOTE */
  #vote-section { margin-bottom: 4rem; }

  .song-card {
    border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1px;
    display: grid; grid-template-columns: 1fr auto auto;
    align-items: center; gap: 1.5rem;
    position: relative; overflow: hidden;
    transition: border-color 0.15s;
  }
  .song-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 0; background: var(--card-hover); transition: width 0.4s ease; z-index: 0;
  }
  .song-card:hover { border-color: var(--mid); }
  .song-card:hover::before { width: 100%; }
  .song-card > * { position: relative; z-index: 1; }
  .song-card.leading { border-color: var(--mid); }

  .song-number { font-size: 0.6rem; color: var(--mid); letter-spacing: 0.1em; }
  .song-title { font-family: 'Special Elite', cursive; font-size: 1.3rem; letter-spacing: 0.02em; }
  .song-artist { font-size: 0.7rem; color: var(--mid); margin-top: 0.2rem; letter-spacing: 0.05em; }

  .vote-bar-wrap { width: 120px; display: flex; flex-direction: column; gap: 4px; }
  .vote-bar-bg { height: 2px; background: #222; position: relative; }
  .vote-bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--white); transition: width 0.5s ease;
  }
  .vote-count { font-size: 0.65rem; color: var(--mid); letter-spacing: 0.1em; }

  .btn-vote {
    background: transparent; border: 1px solid #333; color: var(--white);
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 0.5rem 1rem; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-vote:hover:not(:disabled), .btn-vote.voted {
    background: var(--white); color: var(--black); border-color: var(--white);
  }
  .btn-vote:disabled { opacity: 0.4; cursor: default; }

  .leading-badge {
    font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--mid); border: 1px solid #333; padding: 0.2rem 0.5rem; margin-left: 0.5rem;
  }

  /* LYRICS */
  #lyrics-section { margin-bottom: 3rem; }

  .song-selector { display: flex; gap: 1px; margin-bottom: 2rem; flex-wrap: wrap; }

  .btn-song-sel {
    background: transparent; border: 1px solid #222; color: var(--mid);
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.1em; padding: 0.6rem 1.2rem; cursor: pointer;
    transition: all 0.15s; text-transform: uppercase;
  }
  .btn-song-sel:hover, .btn-song-sel.active {
    background: var(--white); color: var(--black); border-color: var(--white);
  }

  .lyrics-display {
    border: 1px solid var(--border); padding: 2rem;
    min-height: 200px; background: var(--card);
  }

  .lyrics-placeholder {
    color: var(--mid); font-size: 0.75rem; letter-spacing: 0.1em;
    text-align: center; margin-top: 3rem; text-transform: uppercase;
  }

  .lyrics-song-title {
    font-family: 'Special Elite', cursive; font-size: 1.5rem;
    margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }

  .lyrics-text {
    font-family: 'Special Elite', cursive;
    font-size: 1.1rem; line-height: 2.2; white-space: pre-line;
    letter-spacing: 0.02em;
  }

  /* Sections de paroles */
  .lyrics-text .section-header {
    font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--mid); margin-top: 1.5rem; margin-bottom: 0.3rem;
    display: block;
  }

  .lyrics-coming-soon {
    color: var(--mid); font-size: 0.8rem; letter-spacing: 0.2em;
    text-transform: uppercase; text-align: center; padding: 3rem 0;
  }

  footer {
    border-top: 1px solid var(--border); padding: 1.5rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.6rem; color: #333; letter-spacing: 0.1em; text-transform: uppercase;
  }

  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--white); color: var(--black);
    padding: 0.8rem 1.5rem; font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    transform: translateY(100px); opacity: 0;
    transition: all 0.3s ease; z-index: 200;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .song-card { grid-template-columns: 1fr auto; }
    .vote-bar-wrap { display: none; }
  }
</style>
</head>
<body>

<header>
  <div style="flex:1">
    <div class="logo">PlayThatOne</div>
    <div class="tagline" style="margin-top:0.5rem">
      <span class="live-dot" id="live-dot"></span>
      <span id="live-label">Conectando...</span>
    </div>
  </div>
  <button class="btn-theme" id="btn-theme" title="Cambiar tema">◐</button>
</header>

<main>
  <section id="vote-section">
    <div class="section-label">Próxima canción — elige tú</div>
    <div id="song-list"><div style="color:#444;font-size:0.75rem;letter-spacing:0.1em">Cargando...</div></div>
  </section>

  <section id="lyrics-section">
    <div class="section-label">Canta con nosotros</div>
    <div class="song-selector" id="lyric-selector"></div>
    <div class="lyrics-display" id="lyrics-display">
      <div class="lyrics-placeholder">← Elige una canción para ver la letra</div>
    </div>
  </section>
</main>

<footer>
  <span>__PlayThatOne__ — La calle como escenario</span>
  <div class="footer-actions">
    <span style="opacity:0.5">Cantar juntos sana</span>
    <button class="btn-bizum" id="btn-bizum" title="Copiar numero Bizum">
      ♪ Bizum
    </button>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let songs = [];
  let userVotedId = null;   // null = pas encore voté cette session
  let selectedLyricId = null;
  let ws = null;

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${protocol}://${location.host}/ws`);

    ws.onopen = () => {
      document.getElementById('live-dot').classList.remove('disconnected');
      document.getElementById('live-label').textContent = 'En vivo — ¡Vota ahora!';
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.event === 'votes_reset') {
        // Reset : tout le monde peut revoter
        userVotedId = null;
        showToast('🎸 ¡Nueva ronda! Vota la siguiente');
      }
      if (data.songs) {
        songs = data.songs;
        renderVotes();
        renderLyricSelector();
      }
    };

    ws.onclose = () => {
      document.getElementById('live-dot').classList.add('disconnected');
      document.getElementById('live-label').textContent = 'Reconectando...';
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => ws.close();
  }

  // ── Vote ───────────────────────────────────────────────────────────────────
  async function handleVote(id) {
    if (userVotedId !== null) {
      showToast(userVotedId === id ? 'Ya votaste por esta canción' : 'Solo puedes votar una vez');
      return;
    }

    try {
      const res = await fetch(`/vote/${id}`, { method: 'POST', credentials: 'include' });

      if (res.status === 409) {
        // Le serveur dit qu'on a déjà voté (cookie présent)
        const data = await res.json();
        userVotedId = data.voted_for;
        renderVotes();
        showToast('Solo puedes votar una vez por ronda');
        return;
      }

      if (!res.ok) throw new Error();
      userVotedId = id;
      renderVotes();
      showToast('¡Voto registrado! 🤘');
    } catch {
      showToast('Error — inténtalo de nuevo');
    }
  }

  // ── Render votes ───────────────────────────────────────────────────────────
  function renderVotes() {
    const total = songs.reduce((s, c) => s + c.votes, 0);
    const leadingId = songs.length ? songs.reduce((best, s) => s.votes > best.votes ? s : best, songs[0]).id : null;

    const list = document.getElementById('song-list');
    list.innerHTML = '';

    songs.forEach((song, i) => {
      const pct = total > 0 ? Math.round((song.votes / total) * 100) : 0;
      const isLeading = song.id === leadingId && total > 0;
      const isVoted = userVotedId === song.id;
      const hasVoted = userVotedId !== null;

      const card = document.createElement('div');
      card.className = 'song-card' + (isLeading ? ' leading' : '');
      card.innerHTML = `
        <div>
          <div class="song-number">0${i+1}${isLeading ? ' <span class="leading-badge">En cabeza</span>' : ''}</div>
          <div class="song-title">${song.title}</div>
          <div class="song-artist">${song.artist}</div>
        </div>
        <div class="vote-bar-wrap">
          <div class="vote-bar-bg">
            <div class="vote-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="vote-count">${pct}% — ${song.votes} voto${song.votes !== 1 ? 's' : ''}</div>
        </div>
        <button class="btn-vote ${isVoted ? 'voted' : ''}" data-id="${song.id}" ${hasVoted && !isVoted ? 'disabled' : ''}>
          ${isVoted ? '✓ Votado' : 'Votar'}
        </button>
      `;
      list.appendChild(card);
    });

    document.querySelectorAll('.btn-vote:not(:disabled)').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        handleVote(parseInt(btn.dataset.id));
      });
    });
  }

  // ── Lyrics ─────────────────────────────────────────────────────────────────
  function renderLyricSelector() {
    const sel = document.getElementById('lyric-selector');
    sel.innerHTML = '';
    songs.forEach(song => {
      const btn = document.createElement('button');
      btn.className = 'btn-song-sel' + (selectedLyricId === song.id ? ' active' : '');
      btn.textContent = song.title;
      btn.addEventListener('click', () => {
        selectedLyricId = song.id;
        renderLyricSelector();
        renderLyrics();
      });
      sel.appendChild(btn);
    });
  }

  function formatLyrics(raw) {
    // Met en valeur les en-têtes de section [Verse], [Chorus], etc.
    return raw.replace(/\[([^\]]+)\]/g, '<span class="section-header">$1</span>');
  }

  function renderLyrics() {
    const display = document.getElementById('lyrics-display');
    if (!selectedLyricId) {
      display.innerHTML = '<div class="lyrics-placeholder">← Elige una canción para ver la letra</div>';
      return;
    }
    const song = songs.find(s => s.id === selectedLyricId);
    if (!song) return;
    display.innerHTML = song.lyrics
      ? `<div class="lyrics-song-title">${song.title}</div>
         <div class="lyrics-text">${formatLyrics(song.lyrics)}</div>`
      : `<div class="lyrics-song-title">${song.title}</div>
         <div class="lyrics-coming-soon">Letra disponible pronto —<br>¡Por ahora, escucha y siente!</div>`;
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  // Theme toggle
  var savedTheme = localStorage.getItem("pto-theme") || "dark";
  if (savedTheme === "light") document.documentElement.classList.add("light");

  document.getElementById("btn-theme").addEventListener("click", function() {
    var isLight = document.documentElement.classList.toggle("light");
    localStorage.setItem("pto-theme", isLight ? "light" : "dark");
  });

  // Bizum copy
  document.getElementById("btn-bizum").addEventListener("click", function() {
    var numero = "+34658327204";
    var btn = this;
    navigator.clipboard.writeText(numero).then(function() {
      btn.textContent = "✓ " + numero;
      btn.classList.add("copied");
      setTimeout(function() {
        btn.textContent = "♪ Bizum";
        btn.classList.remove("copied");
      }, 2500);
    }).catch(function() {
      // fallback si clipboard pas dispo
      showToast("Bizum: +34658327204");
    });
  });

  connectWS();
</script>
</body>
</html>
